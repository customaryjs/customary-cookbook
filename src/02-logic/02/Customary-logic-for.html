<html lang="en"
      xmlns:customary="https://customaryjs.github.io/schema"
      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
      xsi:schemaLocation="https://customaryjs.github.io/schema https://customaryjs.github.io/customary.xsd"
>
<title>Logic ~ for ~ Customary Cookbook</title>

<h1>Customary Logic Tags</h1>

<p>~ for ~</p><br/>

<script type="application/json"
    data-customary-name="logic-for-recipe"
    data-customary-value="list"
>
  ["Peas", "Carrots", "Tomatoes"]
</script>

<logic-for-recipe></logic-for-recipe>

<template data-customary-name="logic-for-recipe">
  <p>Render a list:</p>
  <ul>
    <customary:for items="{{list}}" value="item" index="index">
          <li>{[index]}: {[item]}</li>
    </customary:for>
  </ul>
</template>

}}</script>
<script type="module">import '#customary';</script>
</html>
