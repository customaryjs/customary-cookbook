<html lang="en"
      xmlns:customary="https://customaryjs.github.io/schema"
      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
      xsi:schemaLocation="https://customaryjs.github.io/schema https://customaryjs.github.io/customary.xsd"
>
<title>Logic ~ move-into ~ Customary Cookbook</title>

<h1>Customary Logic Tags</h1>

<p>~ move-into ~</p><br/>

<script type="application/json"
    data-customary-name="logic-move-into-recipe"
    data-customary-value="list"
>
  ["Peas", "Carrots", "Tomatoes"]
</script>

<logic-move-into-recipe></logic-move-into-recipe>

<template data-customary-name="logic-move-into-recipe">
  <p>Render options inside a select:</p>
  <select>
    <p>
      The web browser's HTML parser
      silently throws away
      any tags considered illegal
      to exist inside a &lt;select&gt; tag!
    </p>
  </select>
  <customary:move-into selector="select">
    <customary:for items="{{list}}" value="item" index="index">
      <option value="{[index]}">{[index]}: {[item]}</option>
    </customary:for>
  </customary:move-into>
</template>

  "#customary": "../../../node_modules/customary/src/now.js",
  "#customary/": "../../../node_modules/customary/src/",
  "#customary/lit": "../../../node_modules/customary/.dist/bundled/customary-library.mjs"
}}</script>
<script type="module">import '#customary';</script>
</html>
