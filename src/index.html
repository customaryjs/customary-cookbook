<!DOCTYPE html>
<html lang="en"
    xmlns:customary="https://customaryjs.github.io/schema"
    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
    xsi:schemaLocation="https://customaryjs.github.io/schema https://customaryjs.github.io/customary.xsd"
>
<head>
    <title>Customary Cookbook</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<customary-cookbook-navigator></customary-cookbook-navigator>

<template data-customary-name="external-link-symbol">&#x2B77;</template>

<template data-customary-name="cookbook-cover">
    <style>
        .cover-content {
            aspect-ratio: 1;
            min-height: 174px;

            font-family: serif;
            border-style: outset;
            border-radius: 8px;
            
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: center;
        }
        .caption {
            font-style: italic;
            font-size: x-large;
            min-height: 68px;
        }
        .emoji {
            font-size: xx-large;
        }
        .tagline {
            font-style: italic;
            font-size: small;
            text-align: center;
            min-height: 38px;
        }
    </style>
    <div class="cover-content">
        <div class="caption">Customary<br>Cookbook</div>
        <div class="emoji">&#x1F475;&#x1F373;</div>
        <div class="tagline">
            <a target="_blank" href="https://customaryjs.github.io/">Customary</a> recipes<br>to teach yourself
        </div>
    </div>
</template>

<template data-customary-name="customary-cookbook-navigator">

<div class="page-layout">

    <nav class="index-panel">
        <cookbook-cover class="desktop-cover-band"></cookbook-cover>
        <div class="cookbook-index">
            <customary:for items="{{chapters}}" value="chapter">
                <div class="chapter-label">{[chapter.chapter_name]}</div>
                <customary:for items="{[chapter.recipes]}" value="recipe">
                    <a class="recipe-link" href="{[recipe.href]}" data-current="{[recipe.is_current]}">{[recipe.name]}</a>
                </customary:for>
            </customary:for>
        </div>
    </nav>
    <customary:classMap target=".index-panel" classInfo="{{index_classmap}}"></customary:classMap>

    <div class="recipe-area">

        <div class="recipe-header-band"
             style="
        display: flex;
        align-items: center;
        justify-content: space-between;             
"
        >
            <cookbook-cover class="mobile-cover-band"></cookbook-cover>
            <button class="hamburger" aria-label="Toggle index"
                    style="align-self: flex-start;"
            >
                &#x2630;
            </button>

            <customary:if condition="{{within_mobile_breakpoint}}">
                <customary:true>
                    <div style="flex: 1; display: flex; flex-direction: column; gap: 1em;">
                        <recipe-title
                                style="flex: 2;"
                                data-customary-expressions
                                data-customary-expression-name="navigation"
                                data-customary-expression-data="{{navigation}}"
                        ></recipe-title>
                        <div style="
                            flex: 1;
                            display: flex; justify-content: space-evenly; gap: 1em;
                            align-items: center;
                        ">
                            <navigation-previous
                                    style="flex: 1;"
                                    data-customary-expressions
                                    data-customary-expression-name="navigation"
                                    data-customary-expression-data="{{navigation}}"
                            ></navigation-previous>
                            <navigation-next
                                    style="flex: 1;"
                                    data-customary-expressions
                                    data-customary-expression-name="navigation"
                                    data-customary-expression-data="{{navigation}}"
                            ></navigation-next>
                        </div>
                    </div>
                </customary:true>
                <customary:false>
                    <div style="
                        flex: 1;
                        display: flex; justify-content: space-evenly;
                        align-items: center;
                    ">
                        <navigation-previous
                                style="flex: 1;"
                                data-customary-expressions
                                data-customary-expression-name="navigation"
                                data-customary-expression-data="{{navigation}}"
                        ></navigation-previous>
                        <recipe-title
                                style="flex: 2;"
                                data-customary-expressions
                                data-customary-expression-name="navigation"
                                data-customary-expression-data="{{navigation}}"
                        ></recipe-title>
                        <navigation-next
                                style="flex: 1;"
                                data-customary-expressions
                                data-customary-expression-name="navigation"
                                data-customary-expression-data="{{navigation}}"
                        ></navigation-next>
                    </div>
                </customary:false>
            </customary:if>
            
        </div>

        <div class="actions-toolbar">
            <a target="_blank" href="{{navigation.html}}">View in new tab <external-link-symbol></external-link-symbol></a>
            <a target="_blank" href="{{navigation.unit_test}}&run">Unit Test <external-link-symbol></external-link-symbol></a>
            <a target="_blank" href="{{navigation.source_html}}">Source: HTML <external-link-symbol></external-link-symbol></a>
            <a target="_blank" href="{{navigation.source_everything}}">Source: Everything <external-link-symbol></external-link-symbol></a>
            <a href="./test.html?run" target="_blank">Run all Unit Tests <external-link-symbol></external-link-symbol></a>
            <div class="help-container">
                <button class="help-toggle" aria-label="Keyboard shortcuts">?</button>
                <customary:if condition="{{show_help}}">
                    <div class="help-popup">
                        <table>
                            <tr><td><kbd>&larr;</kbd> <kbd>&rarr;</kbd></td><td>Previous / Next recipe</td></tr>
                            <tr><td><kbd>Home</kbd></td><td>First recipe</td></tr>
                            <tr><td><kbd>End</kbd></td><td>Last recipe</td></tr>
                            <tr><td><kbd>?</kbd> <kbd>/</kbd></td><td>This help</td></tr>
                        </table>
                    </div>
                </customary:if>
            </div>
        </div>

        <div class="recipe-vision">
            <div class="tv1">
            <div class="tv2">
                <iframe src="{{navigation.html}}"></iframe>
            </div>
            </div>
            <view-source source="{{navigation.html}}"></view-source>
        </div>

    </div>

</div>

<style>
   /* 
      --mobile-breakpoint: 768px
      --foldable-breakpoint: 832px
       
      Note: CSS variables cannot be used in @media conditions.      
      Search each number to find all uses of its breakpoint.
   */

   @media (width <= 768px) {  /* --mobile-breakpoint */
       .page-layout {
           --within-mobile-breakpoint: true;
       }
   }
   @media (width <= 832px) {  /* --foldable-breakpoint */
       .page-layout {
           --within-foldable-breakpoint: true;
       }
   }

   .page-layout {
        display: flex;
        min-height: 100vh;
        align-items: flex-start;
    }

    .index-panel {
        overflow-y: auto;
        background-color: whitesmoke;
        border-right: 1px dashed silver;
        padding: 0.5em 0.75em;
    }
    
    .index-panel cookbook-cover {
        margin-bottom: 1.1em;
    }

    .mobile-cover-band {
        display: none;
    }
    
    .chapter-label {
        font-weight: bold;
        font-size: 0.8em;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: dimgray;
        border-bottom: 1px dotted silver;
        padding-bottom: 2px;
        margin: 0.75em 0 0.25em;
    }
    .recipe-link {
        display: block;
        text-decoration: none;
        padding: 2px 4px 2px 8px;
        font-size: 0.85em;
        color: inherit;
        line-height: 1.6;
    }
    .recipe-link:visited {
        color: gray;
    }
    .recipe-link:hover {
        text-decoration: underline;
    }
    .recipe-link[data-current="true"] {
        font-weight: bold;
        border-left: 3px solid darkkhaki;
        padding-left: 5px;
        background-color: white;
    }

    .recipe-area {
        flex: 1;
        min-height: 100vh;
        min-width: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    .recipe-header-band {
        background-color: whitesmoke;
        border-bottom: 1px dashed silver;
        padding: 0.5em 1em;
        gap: 1em;
    }
    button {
        font-size: large;
        cursor: pointer;
    }
    button.help-toggle {
        font-size: x-small;
    }
    button.hamburger {
        display: none;
        font-size: large;
    }

    .actions-toolbar {
        display: flex;
        gap: 1.5em;
        padding: 0.3em 1em;
        border-bottom: 1px dotted silver;
        font-size: x-small;
        flex-wrap: wrap;
        align-items: center;
    }
    .help-container {
        margin-left: auto;
        position: relative;
    }
    .help-popup {
        position: absolute;
        top: 100%;
        right: 0;
        z-index: 10;
        background-color: white;
        border-style: outset;
        border-width: 3px;
        padding: 0.5em 1em;
        white-space: nowrap;
        margin-top: 4px;
    }
    .help-popup table {
        border-collapse: collapse;
    }
    .help-popup td {
        padding: 0.2em 0.75em 0.2em 0;
        vertical-align: middle;
    }

    .recipe-vision {
        flex: 1;
        display: flex;
        overflow: hidden;
        margin: 16px;
        gap: 10px;
    }
    .tv1 {
        flex: 1;
        display: flex;
        border-color: Gainsboro;
        border-style: double;
        border-left-style: none;
        border-right-style: none;
        border-top-left-radius:  100% 40px;
        border-top-right-radius: 100% 40px;
        border-bottom-left-radius: 100% 40px;
        border-bottom-right-radius: 100% 40px;
    }
    .tv1 {
        height: 660px;
    }
    .tv2 {
        height: 626px;
    }
    iframe {
        min-width: 309px; /* Hello Customary ! (always test in Firefox) */
    }

    @media (width <= 832px) { /* --foldable-breakpoint */
        button.hamburger {
            display: block;
        }
        .index-panel {
            display: none;
        }
        .index-panel.open {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
            height: 98vh;
            overflow-y: auto;
        }
        .desktop-cover-band {
            display: none;
        }
        .mobile-cover-band {
            display: block;
        }
    }
    @media (width <= 768px) { /* --mobile-breakpoint */
        .recipe-header-band {
            zoom: 0.65;
            padding: 0;
            gap: 0.5em;
        }
        .actions-toolbar {
            zoom: 0.65;
            padding: 0;
        }
        .recipe-vision {
            flex-direction: column;
            margin-left: 0;
            margin-right: 0;
        }
        .tv1 {
            height: auto;
        }
        .tv2 {
            height: auto;
        }
        iframe {
            height: 300px;
        }
    }
    .tv2 {
        flex: 1;
        display: flex;
        border-color: Gainsboro;
        border-style: double;
        border-top-style: none;
        border-bottom-style: none;
        border-top-left-radius: 40px 100%;
        border-top-right-radius: 40px 100%;
        border-bottom-left-radius: 40px 100%;
        border-bottom-right-radius: 40px 100%;
        padding: 16px;
    }
    iframe {
        flex: 1;
        border-style: none;
    }
    view-source {
        flex: 1.4;
        min-width: 0;
        overflow-x: auto;
    }
</style>

</template>

<template data-customary-name="recipe-title">
    <div class="recipe-title">
        <div class="recipe-chapter">{{navigation.chapter_name}}</div>
        <div class="recipe-name">
            <customary:if condition="{{navigation.recipe_name}}">
                <customary:true>{{navigation.recipe_name}}</customary:true>
                <customary:false>&nbsp;</customary:false>
            </customary:if>
        </div>
    </div>
    <style>
        .recipe-title {
            text-align: center;
        }
        .recipe-chapter {
            font-size: xx-large;
            font-weight: bold;
        }
        .recipe-name {
            font-size: large;
            color: dimgray;
        }
    </style>
</template>

<template data-customary-name="navigation-previous">
    <div style="display: flex; gap: 0.4em; align-items: center;" class="nav-prev">
        <customary:if condition="{{navigation.has_previous}}">
            <button class="previous" aria-label="Previous recipe">&#x25C4;</button>
            <small class="nav-adjacent-name">{{navigation.previous_name}}</small>
        </customary:if>
    </div>
    <style>
        .nav-adjacent-name {
            font-size: small;
            color: gray;
            margin-top: 0.25em;
        }
        .nav-prev {
            align-items: flex-start;
            flex-direction: row;
        }
    </style>
</template>

<template data-customary-name="navigation-next">
    <div style="display: flex; gap: 0.4em; align-items: center;" class="nav-next">
        <customary:if condition="{{navigation.has_next}}">
            <button class="next" aria-label="Next recipe">&#x25BA;</button>
            <small class="nav-adjacent-name">{{navigation.next_name}}</small>
        </customary:if>
    </div>
    <style>
        .nav-adjacent-name {
            font-size: small;
            color: gray;
            margin-top: 0.25em;
        }
        .nav-next {
            justify-content: flex-start;
            flex-direction: row-reverse;
        }
    </style>
</template>

<template data-customary-name="view-source">
    <style>
        :host { display: block; }
        pre { overflow-x: auto; }
        code { font-size: 13px; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/styles/idea.min.css">
    <pre><code class="language-html" id="source_html"></code></pre>
</template>

<script type="importmap">{"imports": {
    "highlight.js/": "./../node_modules/highlight.js/es/",
    "#customary-cookbook/": "./",
    "#customary": "./../node_modules/customary/src/now.js",
    "#customary/": "./../node_modules/customary/src/",
    "#customary/lit": "./../node_modules/customary/.dist/bundled/customary-library.mjs"
}}</script>
<script type="module">
    import {CustomaryCookbookIndexLoader} from "#customary-cookbook/data/CustomaryCookbookIndexLoader.js";

    const dataPromise = CustomaryCookbookIndexLoader.loadIndex();

    /**
     * @type {CustomaryDeclaration}
     */
    globalThis['customary:recipe-title'] = {config: {state: ['navigation']}};
    /**
     * @type {CustomaryDeclaration}
     */
    globalThis['customary:navigation-previous'] = {config: {state: ['navigation']}};
    /**
     * @type {CustomaryDeclaration}
     */
    globalThis['customary:navigation-next'] = {config: {state: ['navigation']}};

    /**
     * @type {CustomaryDeclaration}
     */
    globalThis['customary:customary-cookbook-navigator'] = {
        config: {state: ['navigation', 'chapters', 'show_help', 'show_index']},
        values: {'show_help': false, 'show_index': false},
        hooks: {
            derive: {
                'index_classmap': el => ({"open": el.show_index}),
                'within_mobile_breakpoint': el => is_within_mobile_breakpoint(el),
            },
            changes: {'navigation': on_navigation_change},
            lifecycle: {connected: on_connected},
            events: [
                {selector:'button.hamburger', listener: toggle_index},
                {selector:'button.previous', listener: navigate_previous},
                {selector:'button.next', listener: navigate_next},
                {selector:'button.help-toggle', listener: toggle_help},
            ],
        }
    };

    async function on_connected(el) {
        document.addEventListener(
            'keydown', 
            e => on_keydown(el, e, document.activeElement)
        );
        document.addEventListener(
            'click', 
            e => on_document_click(el, e)
        );
        
        await use_param_id(el);
    }

    function on_navigation_change(el) {
        make_iframe_height_dynamic_on_narrow_screens(el);
    }

    function make_iframe_height_dynamic_on_narrow_screens(el) {
        if (!is_within_mobile_breakpoint(el)) return;
        
        const iframe = el.renderRoot.querySelector('iframe');
        iframe.addEventListener(
            'load',
            () => {
                resize_iframe(iframe);
                setTimeout(() => resize_iframe(iframe), 1000);
            },
            {once: true}
        );
        function resize_iframe(iframe) {
            iframe.style.height = 
                iframe.contentDocument.body.scrollHeight + 'px';
        }
    }
    
    function is_within_mobile_breakpoint(el) {
        const holder = el.renderRoot.querySelector('.page-layout');
        if (!holder) return false;
        return window.getComputedStyle(holder)
            .getPropertyValue('--within-mobile-breakpoint');
    }

    function on_document_click(el, e) {
        if (!el.show_index) return;
        const path = e.composedPath();
        const panel = el.shadowRoot.querySelector('.index-panel');
        const hamburger = el.shadowRoot.querySelector('button.hamburger');
        if (!path.includes(panel) && !path.includes(hamburger)) {
            el.show_index = false;
        }
    }

    function on_keydown(el, e, target) {
        const tag = target?.tagName?.toLowerCase();
        if (tag === 'input' || tag === 'textarea') return;
        if (e.key === '?' || e.key === '/') { e.preventDefault(); toggle_help(el); return; }
        if (e.key === 'Escape') { e.preventDefault(); el.show_help = false; return; }
        if (e.key === 'ArrowLeft') { e.preventDefault(); navigate_previous(el); }
        if (e.key === 'ArrowRight') { e.preventDefault(); navigate_next(el); }
        if (e.key === 'Home') { e.preventDefault(); navigate_to_id(el.navigation?.first_id); }
        if (e.key === 'End') { e.preventDefault(); navigate_to_id(el.navigation?.last_id); }
    }

    async function use_param_id(el) {
        const params = new URLSearchParams(window.location.search);
        const idParam = params.get("id") ?? '01-01';
        const data = await dataPromise;
        const recipe = data.getNavigationData(idParam);
        el.navigation = {
            "recipe_name": "",
            "previous_name": "",
            "next_name": "",
            ...recipe,
            "html": recipe.page_html,
            "source_html": recipe.github_page_html,
            "source_everything": recipe.github_dir,
            "unit_test": "./test.html?grep=" + encodeURIComponent(recipe.page_html),
            "first_id": data.firstId,
            "last_id": data.lastId,
            "has_previous": !!recipe.previous_id,
            "has_next": !!recipe.next_id,
        };
        const chapters = data.buildChapters(idParam);
        for (const chapter of chapters)
            for (const recipe of chapter.recipes) {
                params.set('id', recipe.id);
                recipe.href = `${window.location.pathname}?${params.toString()}`;
            }
        el.chapters = chapters;
    }

    function toggle_index(el) {
        el.show_index = !el.show_index;
    }

    function toggle_help(el) {
        el.show_help = !el.show_help;
    }

    function navigate_previous(el) {
        if (el.navigation?.has_previous) navigate_to_id(el.navigation.previous_id);
    }

    function navigate_next(el) {
        if (el.navigation?.has_next) navigate_to_id(el.navigation.next_id);
    }

    function navigate_to_id(id) {
        if (!id) return;
        const urlParams = new URLSearchParams(window.location.search);
        urlParams.set('id', id);
        window.location.href = `${window.location.origin}${window.location.pathname}?${urlParams.toString()}`;
    }
</script>
<script type="module">
    /**
     * @type {CustomaryDeclaration}
     */
    globalThis['customary:view-source'] = {
        config: {attributes: ['source']},
        hooks: {changes: {'source': viewSource}}
    };

    import highlight from 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/es/core.min.js';
    // does not work because should use "export default" but it's using "module.exports"
    //    import highlight from 'highlight.js/core.js';
    import html from 'highlight.js/languages/xml.js';
    highlight.registerLanguage('html', html);

    async function viewSource(el, source) {
        if (!source) return;
        const response = await fetch(source);
        const text = await response.text();
        const codeElement = el.shadowRoot.getElementById("source_html");
        codeElement.textContent = text;
        delete codeElement.dataset.highlighted;
        highlight.highlightElement(codeElement);
    }
</script>
<script type="module">import '#customary';</script>
</body>
</html>
