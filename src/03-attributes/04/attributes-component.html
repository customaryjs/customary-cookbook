<html lang="en"
      xmlns:customary="https://customaryjs.github.io/schema"
      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
      xsi:schemaLocation="https://customaryjs.github.io/schema https://customaryjs.github.io/customary.xsd"
>
<h1>chord: {{chord}}</h1>
<div class="keys">
    <customary:for items="{{scale}}">
        <span id="{[value.note]}" class="key">{[value.note]}</span>
        <customary:classMap
                target="span"
                classInfo="{[value.classInfo]}"
        >
        </customary:classMap>
    </customary:for>
</div>
</html>
