<html lang="en"
    xmlns:customary="https://customaryjs.github.io/schema"
    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
    xsi:schemaLocation="https://customaryjs.github.io/schema https://customaryjs.github.io/customary.xsd"
>

<title>Bindings ~ with logic tags ~ Customary Cookbook</title>

<h1>Customary Bindings</h1>

<p>~ with logic tags ~</p><br/>

<script type="application/json"
        data-customary-name="bindings-logic-tags-recipe"
        data-customary-value="state"
>
    ["input_editor", "textarea_editor"]
</script>

<template data-customary-name="bindings-logic-tags-recipe"
          data-customary-attributes="value, is_editable"
>
    <fieldset><legend>customary:if</legend>
        <customary:if condition="{{is_editable}}">
            <fieldset><legend>customary:for</legend>
                <customary:for items="{{state}}" value="item">
                    <fieldset><legend>customary:switch</legend>
                        <customary:switch value="{[item]}">
                            <customary:case value="input_editor">
                                <label>
                                    Edit as input<br/>
                                    <input data-customary-bind="value" />
                                </label>
                            </customary:case>
                            <customary:case value="textarea_editor">
                                <label>
                                    Edit as textarea<br/>
                                    <textarea data-customary-bind="value"></textarea>
                                </label>
                            </customary:case>
                        </customary:switch>
                    </fieldset>
                </customary:for>
            </fieldset>
        </customary:if>
    </fieldset>
    <h1>{{value}}</h1>
</template>

<bindings-logic-tags-recipe is_editable="1" value="Hello Customary !"></bindings-logic-tags-recipe>

<script type="importmap">{"imports": {
    "#customary": "../../_dependencies/customary/customary.mjs"
}}</script>
<script type="module">import '#customary';</script>

</html>
