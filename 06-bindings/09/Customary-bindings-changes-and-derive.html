<html lang="en"
      xmlns:customary="https://customaryjs.github.io/schema"
      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
      xsi:schemaLocation="https://customaryjs.github.io/schema https://customaryjs.github.io/customary.xsd"
>

<title>Bindings ~ changes and derive ~ Customary Cookbook</title>

<h1>Customary Bindings</h1>

<p>~ changes and derive ~</p><br/>

<template data-customary-name="bindings-changes-and-derive"
          data-customary-attributes="value"
>
    <style>
        .bg-green { background-color: lightgreen; }
        .bg-red { background-color: lightcoral; }
    </style>
    <input data-customary-bind="value" />
    <customary:classMap target="input" classInfo="{{bg_classes}}"></customary:classMap>
    <p>Is digits: {{is_digits}}</p>
</template>

<bindings-changes-and-derive value=""></bindings-changes-and-derive>

<script type="importmap">{"imports": {
    "#customary": "../../_dependencies/customary/customary.mjs"
}}</script>
<script type="module">
    /**
     * @type {CustomaryDeclaration}
     */
    globalThis['customary:bindings-changes-and-derive'] = {
        config: { state: ['is_digits'] },
        hooks: {
            changes: {
                'value': (el, value) => el.is_digits = /^\d*$/.test(value)
            },
            derive: {
                'bg_classes': el => ({ 'bg-green': el.is_digits, 'bg-red': !el.is_digits })
            }
        }
    };
</script>
<script type="module">import '#customary';</script>
</html>
